<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Drum Fill Generator</title>
  <style>
    :root {
      --bg: #0b0f14;
      --panel: #12161c;
      --panel-2: #1a1f26;
      --text: #e6e6e6;
      --muted: #8b949e;
      --accent: #2a2f36;
      --accent-2: #22c55e;
      --border: #2a2f36;
      --code: #05080c;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    select {
      color: var(--text);
    }

    .wrap {
      max-width: 1100px;
      margin: 0 auto;
      padding: 20px;
    }

    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }

    h1 {
      margin: 0;
      font-size: 26px;
      font-weight: 700;
    }

    .version {
      font-size: 12px;
      color: var(--muted);
      font-weight: 600;
    }

    .controls {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 12px 16px;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 16px;
      margin-bottom: 20px;
    }

    .control {
      display: flex;
      flex-direction: column;
      gap: 6px;
      position: relative;
    }

    label {
      font-size: 12px;
      color: var(--muted);
      font-weight: 600;
    }

    select, input, button {
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--panel-2);
      color: var(--text);
      padding: 9px 10px;
      font: inherit;
    }

    button { cursor: pointer; }

    #generateBtn {
      background: #2d3748;
    }

    .settings-row {
      display: flex;
      gap: 14px;
      align-items: center;
      flex-wrap: wrap;
    }

    .bpm-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .actions-row {
      grid-column: span 4;
      display: flex;
      gap: 10px;
    }

    .exercise {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 18px;
      margin-bottom: 16px;
    }

    .exercise h2 {
      margin: 0 0 10px;
      font-size: 18px;
    }

    .chart-title {
      margin: 14px 0 6px;
      color: #4ade80;
      font-weight: 700;
    }

    .chart-actions {
      margin-bottom: 6px;
    }

    pre {
      margin: 0;
      border-radius: 8px;
      padding: 10px;
      font-family: monospace;
      background: var(--code);
      border: 1px solid var(--border);
      overflow-x: auto;
      line-height: 1.6;
    }

    /* MOBILE IMPROVEMENTS */
    @media (max-width: 600px) {
      .controls {
        grid-template-columns: 1fr 1fr;
      }

      .actions-row {
        grid-column: span 2;
      }

      /* PORTRAIT: allow scroll */
      pre {
        font-size: 12px;
        white-space: nowrap;
        overflow-x: auto;
      }

      .exercise {
        padding: 14px;
      }
    }

    /* LANDSCAPE MOBILE: fit full phrase */
    @media (max-width: 900px) and (orientation: landscape) {
      .wrap {
        padding: 10px;
      }

      .controls {
        display: none; /* focus on playing */
      }

      pre {
        font-size: 2.8vw; /* scale to screen width */
        white-space: nowrap;
        overflow: hidden;
      }

      .exercise {
        padding: 10px;
      }

      .exercise h2 {
        font-size: 16px;
      }
    }

      .actions-row {
        grid-column: span 2;
      }

      pre {
        font-size: 12px; /* smaller so full phrase fits */
        white-space: pre-wrap; /* allow wrapping */
        word-break: break-word;
      }

      .exercise {
        padding: 14px;
      }
    }

    @media (max-width: 420px) {
      .controls {
        grid-template-columns: 1fr;
      }

      .actions-row {
        grid-column: span 1;
      }

      pre {
        font-size: 11px;
      }
    }

      .actions-row {
        grid-column: span 1;
      }

      pre {
        font-size: 11px;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="header">
      <h1>Drum Fill Generator</h1>
      <div class="version">v1.3</div>
    </div>

    <div class="controls">
      <div class="control">
        <label>Exercises</label>
        <select id="count">
          <option>1</option>
          <option>3</option>
          <option selected>5</option>
        </select>
      </div>

      <div class="control">
        <label>Complexity</label>
        <select id="complexity">
          <option>Easy</option>
          <option selected>Intermediate</option>
        </select>
      </div>

      <div class="control">
        <label>Group sizes</label>
        <select>
          <option>2, 3, 4, 5</option>
        </select>
      </div>

      <div class="control">
        <label>Rudiment</label>
        <select>
          <option>Random mix</option>
        </select>
      </div>

      <div class="settings-row">
        <label><input type="checkbox" checked> Start R/K</label>
        <label><input type="checkbox"> Ghost</label>
        <label><input type="checkbox"> Chop</label>
      </div>

      <div class="bpm-group">
        <label>BPM</label>
        <input type="number" value="80">
      </div>

      <div class="settings-row">
        <label><input type="checkbox"> Click</label>
        <label><input type="checkbox"> Loop</label>
      </div>

      <div class="actions-row">
        <button id="generateBtn">Generate</button>
        <button>Copy JSON</button>
      </div>
    </div>

    <div class="exercise">
      <h2>Exercise 1 — 2 | 3 | 4 | 5 | 2</h2>

      <div class="chart-title">Sticking</div>
      <div class="chart-actions">
        <button>Play beat</button>
      </div>
      <pre>
> . | > . . | > . . > | > .
x - | - - x | - - - x | -
R L | R L R | L R L L | R
      </pre>

      <div class="chart-title">Orchestrating</div>
      <div class="chart-actions">
        <button>Play beat</button>
      </div>
      <pre>
> . | > . . | > . . > | > .
x - | - - x | - - - x | -
R L | R L K | L K L L | R
      </pre>
    </div>

  </div>
</body>
</html>
